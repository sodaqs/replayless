name: Release

# Builds the single `replayless-gui` .exe on Windows and publishes it to a
# GitHub Release. Self-contained: builds fresh rather than relying on artifacts
# from the CI workflow. No installer — just the one self-contained executable
# (the icon is embedded via build.rs).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, e.g. v0.1.0 (created from the current commit if it doesn't exist)."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PACKAGE: replayless-gui

jobs:
  release:
    name: Build & publish (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # git-cliff needs the full history + tags to build the changelog.
          fetch-depth: 0

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            # The dispatched tag may not exist in git yet, so render the
            # pending (unreleased) commits under that version.
            echo "cliff_args=--unreleased --tag ${{ inputs.tag }} --strip header" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            # Tag already exists on this commit — render its section.
            echo "cliff_args=--latest --strip header" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: gui-windows

      - name: Build release exe
        run: cargo build -p ${{ env.PACKAGE }} --release --target x86_64-pc-windows-msvc

      - name: Stage release exe
        shell: bash
        run: |
          mkdir -p dist
          cp "target/x86_64-pc-windows-msvc/release/replayless-gui.exe" \
             "dist/replayless.exe"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.13.1

      - name: Render release notes
        shell: bash
        run: |
          # Trimmed view for the Release page (Features/Fixes/Perf + a link to
          # the full CHANGELOG.md). The complete changelog uses cliff.toml.
          #
          # Write to a file and feed it via body_path below — NOT through a step
          # output. The git-cliff action's $GITHUB_OUTPUT path mishandles the
          # multiline body ("Matching delimiter not found 'EOF'"); a file avoids
          # that entirely.
          git-cliff --config cliff-release.toml ${{ steps.tag.outputs.cliff_args }} -o release-notes.md
          echo "----- release notes -----"
          cat release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          # Use git-cliff's categorized notes instead of GitHub's PR-based ones.
          body_path: release-notes.md
          generate_release_notes: false
          files: dist/replayless.exe
          fail_on_unmatched_files: true
