name: Release

# Builds the single `replayless-gui` .exe on Windows and publishes it to a
# GitHub Release. Self-contained: builds fresh rather than relying on artifacts
# from the CI workflow. No installer — just the one self-contained executable
# (the icon is embedded via build.rs).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, e.g. v0.1.0 (created from the current commit if it doesn't exist)."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PACKAGE: replayless-gui

jobs:
  release:
    name: Build & publish (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: gui-windows

      - name: Build release exe
        run: cargo build -p ${{ env.PACKAGE }} --release --target x86_64-pc-windows-msvc

      - name: Stage versioned exe
        shell: bash
        run: |
          mkdir -p dist
          cp "target/x86_64-pc-windows-msvc/release/replayless-gui.exe" \
             "dist/replayless-gui-${{ steps.tag.outputs.tag }}.exe"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/replayless-gui-${{ steps.tag.outputs.tag }}.exe
          fail_on_unmatched_files: true
